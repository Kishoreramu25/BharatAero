<script>
        function createConfetti() {
            const anchor = document.getElementById('confetti-anchor');
            const colors = ['#ca0013', '#22c55e', '#3b82f6', '#f59e0b'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                const startX = Math.random() * 100;
                const startY = Math.random() * 100;
                
                confetti.style.left = startX + '%';
                confetti.style.top = startY + '%';
                
                anchor.appendChild(confetti);
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = 100 + Math.random() * 150;
                const xDist = Math.cos(angle) * velocity;
                const yDist = Math.sin(angle) * velocity;
                
                confetti.animate([
                    { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
                    { transform: `translate(${xDist}px, ${yDist}px) rotate(${Math.random() * 360}deg)`, opacity: 0 }
                ], {
                    duration: 1000 + Math.random() * 1000,
                    easing: 'cubic-bezier(0, .9, .57, 1)',
                    fill: 'forwards'
                });

                setTimeout(() => confetti.remove(), 2000);
            }
        }

        // Trigger confetti on load
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(createConfetti, 300);
        });
    </script>
