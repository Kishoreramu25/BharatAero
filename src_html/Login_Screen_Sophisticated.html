<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | MISD DronePilot</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed-dim": "#ffb4ab",
                    "on-secondary-container": "#fffbff",
                    "inverse-on-surface": "#f3f0ef",
                    "surface-dim": "#dcd9d8",
                    "on-secondary": "#ffffff",
                    "on-error": "#ffffff",
                    "on-surface-variant": "#444844",
                    "on-secondary-fixed": "#410002",
                    "tertiary-container": "#121f1d",
                    "on-secondary-fixed-variant": "#93000a",
                    "outline-variant": "#c4c7c2",
                    "on-primary-fixed": "#161d18",
                    "surface-container": "#f0edec",
                    "on-primary-container": "#7f867f",
                    "on-tertiary-fixed": "#111e1c",
                    "secondary": "#ca0013",
                    "error": "#ba1a1a",
                    "surface-container-high": "#eae8e6",
                    "surface-container-highest": "#e5e2e0",
                    "on-error-container": "#93000a",
                    "background": "#eeebe3",
                    "primary-container": "#171e19",
                    "inverse-primary": "#c1c8c0",
                    "primary": "#000201",
                    "tertiary-fixed-dim": "#bbcac6",
                    "on-tertiary": "#ffffff",
                    "surface-container-low": "#f6f3f1",
                    "on-tertiary-fixed-variant": "#3c4a47",
                    "surface": "#fcf9f7",
                    "secondary-fixed": "#ffdad6",
                    "tertiary-fixed": "#d7e6e2",
                    "on-primary": "#ffffff",
                    "surface-bright": "#fcf9f7",
                    "inverse-surface": "#313030",
                    "outline": "#747874",
                    "primary-fixed-dim": "#c1c8c0",
                    "surface-tint": "#59605a",
                    "error-container": "#ffdad6",
                    "on-background": "#1b1c1b",
                    "secondary-container": "#e42022",
                    "surface-container-lowest": "#ffffff",
                    "surface-variant": "#e5e2e0",
                    "on-surface": "#1b1c1b",
                    "on-tertiary-container": "#798884",
                    "primary-fixed": "#dde5dc",
                    "tertiary": "#000202",
                    "on-primary-fixed-variant": "#414943"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "base": "8px",
                    "stack-lg": "48px",
                    "container-padding-desktop": "40px",
                    "container-padding-mobile": "20px",
                    "gutter": "24px",
                    "stack-sm": "12px",
                    "stack-md": "24px"
            },
            "fontFamily": {
                    "body-md": ["Nunito Sans"],
                    "label-sm": ["Nunito Sans"],
                    "headline-lg": ["Nunito Sans"],
                    "headline-lg-mobile": ["Nunito Sans"],
                    "headline-md": ["Nunito Sans"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "label-sm": ["10px", {"lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "700"}],
                    "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "900"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "900"}],
                    "headline-md": ["20px", {"lineHeight": "1.3", "fontWeight": "800"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #eeebe3;
            font-family: 'Nunito Sans', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .large-spread-shadow {
            box-shadow: 0 20px 50px -12px rgba(23, 30, 25, 0.08);
        }

        .input-glow:focus-within {
            border-color: rgba(183, 198, 194, 0.6) !important;
            box-shadow: 0 0 0 4px rgba(183, 198, 194, 0.1);
        }

        .segmented-control-bg {
            background: rgba(183, 198, 194, 0.15);
        }

        .pill-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background">
<!-- Auth Shell Suppression: No TopAppBar or BottomNavBar as per transactional rule -->
<main class="w-full max-w-[480px] px-container-padding-mobile md:px-0">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-stack-lg">
<div class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center mb-base transition-transform hover:scale-105 duration-500 cursor-pointer">
<span class="material-symbols-outlined text-white text-[32px]" data-icon="flight_takeoff">flight_takeoff</span>
</div>
<h1 class="text-headline-lg-mobile md:text-headline-lg font-headline-lg text-primary tracking-tight">
                MISD DronePilot
            </h1>
<p class="text-on-surface-variant font-body-md text-body-md opacity-70">Secured Fleet Operations</p>
</div>
<!-- Main Card Container -->
<div class="bg-surface-container-lowest border border-[#b7c6c2]/25 rounded-xl p-stack-md md:p-stack-lg large-spread-shadow relative overflow-hidden">
<!-- Contextual Decorative Gradient -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-secondary/5 rounded-full blur-3xl"></div>
<!-- Segmented Control (Pills) -->
<div class="segmented-control-bg p-1 rounded-full flex mb-stack-md relative z-10" id="login-toggle">
<button class="flex-1 py-3 px-4 rounded-full text-label-sm font-label-sm uppercase pill-transition bg-white text-primary shadow-sm" id="btn-phone" onclick="toggleLogin('phone')">
                    Phone
                </button>
<button class="flex-1 py-3 px-4 rounded-full text-label-sm font-label-sm uppercase pill-transition text-on-surface-variant hover:text-primary" id="btn-email" onclick="toggleLogin('email')">
                    Email
                </button>
</div>
<!-- Login Form -->
<form class="space-y-stack-md relative z-10" id="auth-form" onsubmit="event.preventDefault();">
<!-- Dynamic Input Container -->
<div id="input-container">
<label class="block text-label-sm font-label-sm text-primary uppercase mb-2 ml-4">Phone Number</label>
<div class="relative group input-glow rounded-lg border border-[#b7c6c2]/20 bg-[#eeebe3] transition-all">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-on-surface-variant/40" data-icon="smartphone">smartphone</span>
<input class="w-full bg-transparent border-none py-4 pl-14 pr-6 focus:ring-0 text-body-md font-body-md rounded-lg" placeholder="+1 (555) 000-0000" required="" type="tel"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-secondary text-white font-headline-md text-headline-md py-5 rounded-lg transition-all active:scale-95 hover:opacity-90 tracking-wide uppercase" type="submit">
                    REQUEST ACCESS CODE
                </button>
<!-- Security Note -->
<p class="text-center text-label-sm font-label-sm text-on-surface-variant opacity-60 leading-relaxed">
                    By clicking above, you agree to our <a class="underline hover:text-secondary transition-colors" href="#">Operational Protocols</a> and data privacy standards.
                </p>
</form>
</div>
<!-- Footer Links -->
<div class="mt-stack-md text-center space-y-4">
<a class="inline-block text-body-md font-body-md text-primary opacity-80 hover:opacity-100 transition-opacity" href="#">
                New here? <span class="font-bold underline decoration-secondary/30">Register Fleet Operator</span>
</a>
<div class="pt-stack-md flex justify-center gap-gutter opacity-40">
<span class="material-symbols-outlined cursor-help" data-icon="lock" title="Encrypted Connection">lock</span>
<span class="material-symbols-outlined cursor-help" data-icon="verified_user" title="FAA Certified">verified_user</span>
<span class="material-symbols-outlined cursor-help" data-icon="cloud_done" title="Cloud Sync">cloud_done</span>
</div>
</div>
</main>
<!-- Background Atmospheric Elements -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-10 left-1/4 w-[500px] h-[500px] bg-[#b7c6c2]/10 rounded-full blur-[100px] animate-pulse"></div>
<div class="absolute bottom-10 right-1/4 w-[600px] h-[600px] bg-secondary/5 rounded-full blur-[120px]"></div>
</div>
<script>
        function toggleLogin(mode) {
            const btnPhone = document.getElementById('btn-phone');
            const btnEmail = document.getElementById('btn-email');
            const container = document.getElementById('input-container');
            
            if (mode === 'email') {
                btnEmail.classList.add('bg-white', 'text-primary', 'shadow-sm');
                btnEmail.classList.remove('text-on-surface-variant');
                btnPhone.classList.remove('bg-white', 'text-primary', 'shadow-sm');
                btnPhone.classList.add('text-on-surface-variant');
                
                container.innerHTML = `
                    <label class="block text-label-sm font-label-sm text-primary uppercase mb-2 ml-4">Corporate Email</label>
                    <div class="relative group input-glow rounded-lg border border-[#b7c6c2]/20 bg-[#eeebe3] transition-all">
                        <span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-on-surface-variant/40" data-icon="mail">mail</span>
                        <input type="email" placeholder="pilot@misd-automation.com" class="w-full bg-transparent border-none py-4 pl-14 pr-6 focus:ring-0 text-body-md font-body-md rounded-lg" required>
                    </div>
                `;
            } else {
                btnPhone.classList.add('bg-white', 'text-primary', 'shadow-sm');
                btnPhone.classList.remove('text-on-surface-variant');
                btnEmail.classList.remove('bg-white', 'text-primary', 'shadow-sm');
                btnEmail.classList.add('text-on-surface-variant');
                
                container.innerHTML = `
                    <label class="block text-label-sm font-label-sm text-primary uppercase mb-2 ml-4">Phone Number</label>
                    <div class="relative group input-glow rounded-lg border border-[#b7c6c2]/20 bg-[#eeebe3] transition-all">
                        <span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-on-surface-variant/40" data-icon="smartphone">smartphone</span>
                        <input type="tel" placeholder="+1 (555) 000-0000" class="w-full bg-transparent border-none py-4 pl-14 pr-6 focus:ring-0 text-body-md font-body-md rounded-lg" required>
                    </div>
                `;
            }
        }
    </script>
</body></html>
